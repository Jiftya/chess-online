<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Frame-Options" content="ALLOWALL">
    <title>Grandmaster | Social Chess</title>
    
    <script>
        // Inject chessboard CSS dynamically so relative URLs resolve in iframe/srcdoc contexts
        (function () {
            var link = document.createElement('link');
            link.rel  = 'stylesheet';
            link.href = 'https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css';
            document.head.appendChild(link);
        })();

        // Sequential dependency loader — guarantees each script is fully parsed
        // before the next one starts. Fixes "X is not defined" in iframes where
        // the browser treats dynamically inserted scripts as non-blocking.
        //
        // CDN choices:
        //   - cdnjs for jQuery & chess.js  (reliable, no CORS issues in frames)
        //   - jsdelivr /umd/ path for chessboardjs & supabase  (explicit UMD build
        //     so window.Chessboard and window.supabase globals are defined)
        (function () {
            var SCRIPTS = [
                'https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js',
                'https://cdn.jsdelivr.net/npm/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js',
                'https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js',
                'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js'
            ];
            function loadNext(i) {
                if (i >= SCRIPTS.length) {
                    document.dispatchEvent(new Event('depsReady'));
                    return;
                }
                var s = document.createElement('script');
                s.src     = SCRIPTS[i];
                s.onload  = function () { loadNext(i + 1); };
                s.onerror = function () {
                    console.error('Failed to load: ' + SCRIPTS[i]);
                    loadNext(i + 1);
                };
                document.head.appendChild(s);
            }
            loadNext(0);
        })();
    </script>

    <style>
        :root {
            --bg: #312e2b;
            --surface: #262421;
            --surface-strong: #211f1c;
            --text: #ffffff;
            --muted: #989795;
            --border: #403d39;
            --accent: #81b64c;
            --accent-dim: #5a7f34;
            --white-sq: #ebecd0;
            --black-sq: #779556;
            --danger: #c0392b;
            --gold: #e6a817;
        }

        html, body { height: 100%; margin: 0; }
        body {
            background-color: var(--bg); color: var(--text); font-family: 'Courier New', monospace;
            margin: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100%; height: 100%; padding: 20px; overflow: auto; box-sizing: border-box;
        }

        /* --- PARTY MODE ANIMATION --- */
        @keyframes partyBackground {
            0% { background-color: #7a2c2c; } 25% { background-color: #2c7a3a; }
            50% { background-color: #2c3a7a; } 75% { background-color: #767a2c; } 100% { background-color: #7a2c2c; }
        }
        body.party-active { animation: partyBackground 3s infinite alternate ease-in-out; }
        body.sound-flash { outline: 3px solid var(--accent) !important; }

        * { border-radius: 0 !important; box-shadow: none !important; box-sizing: border-box; }

        /* GLOBAL BANNER — sticky so it works inside iframes too */
        #global-banner {
            position: sticky; top: 0; left: 0; width: 100%; z-index: 9999; 
            background: var(--accent); color: #1a1917;
            font-family: 'Courier New', monospace; font-weight: bold; font-size: 0.88rem; 
            text-align: center; padding: 12px 24px;
            transform: translateY(-110%); transition: transform 0.35s cubic-bezier(.4,0,.2,1); 
            letter-spacing: 0.06em; border-bottom: 3px solid var(--accent-dim);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-bottom: -52px; /* collapse when hidden so it doesn't push layout */
        }
        #global-banner.show { transform: translateY(0); margin-bottom: 0; }
        #global-banner-sender { opacity: 0.8; text-transform: uppercase; }

        .master-container {
            display: flex; width: 100%; max-width: 1150px; height: min(650px, calc(100vh - 40px));
            background: var(--surface-strong); border: 4px solid var(--border);
        }

        #board-wrapper {
            flex: 0 0 auto; width: min(610px, 58vw); background: #2b2927; display: flex;
            justify-content: center; align-items: center; border-right: 4px solid var(--border); padding: 20px; position: relative;
        }
        #board { width: min(560px, calc(58vw - 40px)); }

        #board-idle-msg {
            position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(33,31,28,0.82); color: var(--muted); font-size: 0.85rem; letter-spacing: 0.08em;
            text-transform: uppercase; pointer-events: none; transition: opacity 0.3s;
        }
        #board-idle-msg.hidden { opacity: 0; }

        .sidebar { flex: 1; display: flex; flex-direction: column; background: var(--surface); overflow: hidden; }
        .tab-content { padding: 22px; flex-grow: 1; overflow-y: auto; }
        .hidden { display: none !important; }

        .user-bar {
            padding: 10px 16px; background: var(--surface-strong); border-bottom: 2px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .pfp { width: 34px; height: 34px; background: #444; border: 2px solid var(--accent); object-fit: cover; }
        .user-bar-info { display: flex; flex-direction: column; flex: 1; }
        .coin-display { font-weight: bold; color: var(--gold); font-size: 0.85rem; margin-left: auto; letter-spacing: 0.05em; }

        h2 {
            font-size: 1.1rem; text-transform: uppercase; color: var(--accent); margin: 0 0 16px 0;
            border-bottom: 2px solid var(--border); padding-bottom: 8px; letter-spacing: 0.1em;
        }

        label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 3px; margin-top: 8px; }

        input, select {
            background: #1a1917; border: 2px solid var(--border); color: white; padding: 9px 10px; margin-bottom: 4px;
            width: 100%; font-family: 'Courier New', monospace; font-size: 0.85rem;
        }

        button {
            background: var(--accent); color: white; border: none; padding: 11px; width: 100%; cursor: pointer;
            font-family: 'Courier New', monospace; font-weight: bold; text-transform: uppercase; margin-bottom: 7px;
            font-size: 0.82rem; letter-spacing: 0.07em; transition: 0.15s;
        }
        button:hover { opacity: 0.85; }
        .sec-btn { background: #3d3a37; border: 1px solid var(--border); }
        .admin-btn { background: var(--gold); color: #1a1917; }
        .danger-btn { background: var(--danger); color: white; }

        /* SHOP STYLES */
        .shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .shop-item {
            background: #1a1917; border: 2px solid var(--border); padding: 12px; text-align: center; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; transition: 0.2s;
        }
        .shop-item.equipped { border-color: var(--accent); background: rgba(129,182,76,0.05); }
        .shop-item.owned { border-color: var(--gold); }
        .item-preview-img { width: 45px; height: 45px; margin-bottom: 8px; pointer-events: none; }

        .chat-box { height: 110px; background: #1a1917; border: 2px solid var(--border); overflow-y: auto; padding: 8px; font-size: 0.76rem; margin-bottom: 8px; }
        .white-1e1d7 { background-color: var(--white-sq) !important; }
        .black-3c85d { background-color: var(--black-sq) !important; }

        #result-rewards { margin-top: 8px; font-weight: bold; color: var(--gold); font-size: 0.85rem; letter-spacing: 0.05em; }

        /* Board locked until match is found */
        #board-wrapper.board-locked .board-b72b1 { pointer-events: none !important; cursor: not-allowed !important; }
        #board-wrapper.board-locked #board { opacity: 0.45; }

        /* Chat locked state */
        #chat-input:disabled { opacity: 0.4; cursor: not-allowed; }
        #chat-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        #game-result-overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(33, 31, 28, 0.88); z-index: 50; animation: resultFadeIn 0.4s ease;
        }
    </style>
</head>
<body>

<div id="global-banner">
    <img id="global-banner-pfp" src="" style="width:24px;height:24px;object-fit:cover;border:1px solid rgba(0,0,0,0.2);display:none;">
    <div>
        <span id="global-banner-sender"></span>
        <span id="global-banner-text"></span>
    </div>
</div>

<div class="master-container">
    <div id="board-wrapper" class="board-locked">
        <div id="board"></div>
        <div id="board-idle-msg">
            <div style="font-size: 2.5rem; margin-bottom: 10px; opacity: 0.5;">♟</div>
            <div>Waiting for match</div>
        </div>
        <div id="game-result-overlay" class="hidden">
            <div id="result-icon" style="font-size: 3.5rem; margin-bottom: 10px;"></div>
            <div id="result-title" style="font-size: 1.5rem; font-weight: bold; text-transform: uppercase;"></div>
            <div id="result-sub" style="font-size: 0.78rem; color: var(--muted); text-transform: uppercase;"></div>
            <div id="result-rewards"></div>
            <button onclick="leaveGame()" style="margin-top:18px;width:180px;">Back to Lobby</button>
        </div>
    </div>
    
    <div class="sidebar">
        <div id="user-profile-bar" class="user-bar hidden">
            <img src="" id="my-pfp" class="pfp">
            <div class="user-bar-info">
                <div style="font-weight: bold; font-size: 0.88rem;">
                    <span id="my-display-name">Player</span>
                    <span id="admin-badge" class="admin-badge hidden" style="font-size: 0.58rem; background: #e6a817; color: #1a1917; padding: 1px 5px; text-transform: uppercase; margin-left:5px;">Admin</span>
                </div>
                <div id="my-email-sub" style="font-size: 0.65rem; color: var(--muted);"></div>
            </div>
            <div class="coin-display" id="nav-coins">💰 0</div>
        </div>

        <div id="view-auth" class="tab-content">
            <h2>System Access</h2>
            <div id="auth-error" class="hidden" style="color:var(--danger); font-size:0.75rem; margin-bottom:10px;"></div>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-pass" placeholder="Password">
            <button onclick="handleAuth('login')">Login</button>
            <button class="sec-btn" onclick="handleAuth('signup')">Register</button>
        </div>

        <div id="view-lobby" class="tab-content hidden">
            <h2>Lobby</h2>
            <button onclick="findMatch()">▶ Play Online</button>
            <button class="sec-btn" onclick="showShop()">Shop</button>
            <button class="sec-btn" onclick="showView('view-profile')">Edit Profile</button>
            <button id="admin-panel-btn" class="admin-btn hidden" onclick="showView('view-admin')">⚡ Admin Panel</button>
            <button class="sec-btn" style="color:var(--danger); margin-top:10px;" onclick="signOut()">Logout</button>
        </div>

        <div id="view-shop" class="tab-content hidden">
            <h2>Shop</h2>
            <label>Piece Sets</label>
            <div class="shop-grid" id="shop-pieces-grid"></div>
            <button class="sec-btn" onclick="showView('view-lobby')">← Back</button>
        </div>

        <div id="view-profile" class="tab-content hidden">
            <h2>Edit Profile</h2>
            <label>Display Name</label>
            <input type="text" id="set-name">
            <label>Profile Picture</label>
            <div style="margin-bottom:8px;"><img id="pfp-preview" src="" style="width:60px;height:60px;object-fit:cover;border:2px solid var(--border);display:none;"></div>
            <label id="pfp-upload-label" style="display:block;width:100%;padding:9px;background:#1a1917;border:2px dashed var(--border);cursor:pointer;text-align:center;font-size:0.75rem;">
                📁 Click to upload
                <input type="file" id="pfp-file" accept="image/*" style="display:none;" onchange="previewPfp(event)">
            </label>
            <button onclick="updateProfile()" style="margin-top:10px;">Save Profile</button>
            <button class="sec-btn" onclick="showView('view-lobby')">← Back</button>
        </div>

        <div id="view-admin" class="tab-content hidden">
            <h2>⚡ Admin Panel</h2>
            <label>Broadcast Message</label>
            <input type="text" id="admin-msg" placeholder="Message...">
            <button class="admin-btn" onclick="sendBroadcast()">📢 Broadcast</button>

            <label>Economy (Give Coins)</label>
            <input type="text" id="admin-target-id" placeholder="Player ID or 'all'">
            <input type="number" id="admin-coin-amount" placeholder="Amount">
            <button class="admin-btn" onclick="adminGiveMoney()">💰 Grant Coins</button>

            <label>Triggers</label>
            <button onclick="togglePartyMode()" class="sec-btn">🎉 Toggle Party Mode</button>
            
            <label>Sound Controls</label>
            <select id="admin-sound-select"><option value="">-- Select Sound --</option></select>
            <label style="margin-top:6px;">Upload New Sound</label>
            <input type="file" id="admin-sound-file" accept="audio/*">
            <button class="admin-btn" onclick="broadcastSound()">🔊 Play Sound for All</button>
            <button class="danger-btn" onclick="stopAllSounds()">🛑 Stop All Sounds</button>
            
            <button class="sec-btn" style="margin-top:20px;" onclick="showView('view-lobby')">← Back</button>
        </div>

        <div id="view-game" class="tab-content hidden">
            <div id="turn-display">Turn: White</div>
            <div class="chat-box" id="chat-logs"></div>
            <input type="text" id="chat-input" placeholder="Waiting for match..." disabled onkeypress="if(event.key==='Enter') sendChat()">
            <button class="sec-btn" style="color:var(--danger);" onclick="promptResign()">⚑ Resign</button>
            <div id="resign-confirm" class="hidden" style="background:#1a1917;border:1px solid var(--danger);padding:10px;margin-top:5px;">
                <button class="danger-btn" onclick="confirmResign()">Confirm Resign</button>
                <button class="sec-btn" onclick="cancelResign()">Cancel</button>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPA_URL = 'https://psxwatcuxalaizjsysdc.supabase.co';
    const SUPA_KEY = 'sb_publishable_HE2jpXo0QaT8Zz2OXWTrZw_cdKCPLpp';
    const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

    const STABLE_PIECE_BASE = 'https://raw.githubusercontent.com/lichess-org/lila/master/public/piece/';
    const PREVIEW_PIECES = ['wP', 'wN', 'wB', 'wR', 'wQ', 'wK'];
    const DEFAULT_AVATAR = `data:image/svg+xml,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#2b2927"/><text x="50" y="74" font-size="64" text-anchor="middle" fill="#81b64c">♟</text></svg>')}`;

    let game = new Chess();
    let board = null;
    let user = null;
    let myCoins = 0;
    let myInventory = { pieces: ['cburnett'] };
    let myEquipped = { piece: 'cburnett' };
    let currentMatchId = null;
    let currentAudio = null;
    let shopTicker = null;

    const SHOP_DATA = {
        pieces: [
            { id: 'cburnett', name: 'Standard', price: 0 },
            { id: 'alpha', name: 'Alpha', price: 200 },
            { id: 'merida', name: 'Merida', price: 400 },
            { id: 'leipzig', name: 'Leipzig', price: 600 },
            { id: 'pixel', name: 'Pixel', price: 800 }
        ]
    };

    // depsReady fires after all CDN scripts load in order (iframe-safe)
    document.addEventListener('depsReady', function () {
        // Board starts locked — no dragging until a match is found
        board = Chessboard('board', { position: 'start', pieceTheme: getPieceUrl, draggable: false });
        checkSession();
        subscribeGlobal();
    });

    function getPieceUrl(piece, theme = null) {
        const t = theme || myEquipped.piece;
        return `${STABLE_PIECE_BASE}${t}/${piece}.svg`;
    }

    const globalChan = sb.channel('global_main', { config: { broadcast: { self: true } } });
    function subscribeGlobal() {
        globalChan
            .on('broadcast', { event: 'announcement' }, (p) => {
                showBanner(p.payload.name, p.payload.msg, p.payload.pfp);
            })
            .on('broadcast', { event: 'party_mode' }, (p) => $('body').toggleClass('party-active', p.payload.active))
            .on('broadcast', { event: 'play_sound' }, (p) => {
                if (currentAudio) currentAudio.pause();
                currentAudio = new Audio(p.payload.url);
                currentAudio.play().catch(() => {});
                $('body').addClass('sound-flash');
                setTimeout(() => $('body').removeClass('sound-flash'), 600);
            })
            .on('broadcast', { event: 'stop_sound' }, () => {
                if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }
            })
            .on('broadcast', { event: 'payout' }, (p) => {
                if (user && (p.payload.target === 'all' || p.payload.target === user.id)) {
                    myCoins += parseInt(p.payload.amount);
                    saveEconomy();
                }
            })
            .subscribe();
    }

    // --- BROADCAST BANNER LOGIC ---
    let bannerTimer = null;
    function showBanner(name, msg, pfp) {
        if (pfp) $('#global-banner-pfp').attr('src', pfp).show();
        else $('#global-banner-pfp').hide();
        
        $('#global-banner-sender').text(name + ': ');
        $('#global-banner-text').text(msg);
        $('#global-banner').addClass('show');
        
        if (bannerTimer) clearTimeout(bannerTimer);
        bannerTimer = setTimeout(() => $('#global-banner').removeClass('show'), 6000);
    }

    async function sendBroadcast() {
        const msg = $('#admin-msg').val().trim();
        if (!msg) return;
        const name = $('#my-display-name').text();
        const pfp = $('#my-pfp').attr('src');
        
        await globalChan.send({
            type: 'broadcast',
            event: 'announcement',
            payload: { name, msg, pfp }
        });
        $('#admin-msg').val('');
    }

    // --- SESSION & PROFILE ---
    async function checkSession() {
        const { data } = await sb.auth.getUser();
        if (data?.user) {
            user = data.user;
            const { data: prof } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
            
            myCoins = prof?.coins || 0;
            myInventory = prof?.inventory || { pieces: ['cburnett'] };
            myEquipped = prof?.equipped || { piece: 'cburnett' };
            
            $('#my-display-name').text(prof?.display_name || user.email.split('@')[0]);
            $('#my-email-sub').text(user.email);
            $('#my-pfp').attr('src', prof?.pfp_url || DEFAULT_AVATAR);
            
            if (prof?.is_admin) {
                $('#admin-panel-btn, #admin-badge').removeClass('hidden');
                loadSoundList();
            }
            
            updateCoinUI();
            $('#user-profile-bar').removeClass('hidden');
            showView('view-lobby');
        }
    }

    // --- REMAINING LOGIC (Admin Sounds, Shop, Economy) Preserved exactly ---
    async function loadSoundList() {
        const { data: files } = await sb.storage.from('avatars').list('global_sounds');
        const sel = $('#admin-sound-select').empty().append('<option value="">-- Select Sound --</option>');
        if (files) files.forEach(f => {
            const url = sb.storage.from('avatars').getPublicUrl('global_sounds/' + f.name).data.publicUrl;
            sel.append(`<option value="${url}">${f.name}</option>`);
        });
    }

    async function broadcastSound() {
        const file = $('#admin-sound-file')[0].files[0];
        let url = $('#admin-sound-select').val();
        if (file) {
            const path = 'global_sounds/' + file.name;
            await sb.storage.from('avatars').upload(path, file, { upsert: true });
            url = sb.storage.from('avatars').getPublicUrl(path).data.publicUrl;
            await loadSoundList();
        }
        if (url) await globalChan.send({ type: 'broadcast', event: 'play_sound', payload: { url } });
    }

    async function stopAllSounds() { await globalChan.send({ type: 'broadcast', event: 'stop_sound' }); }
    async function togglePartyMode() {
        const active = !$('body').hasClass('party-active');
        await globalChan.send({ type: 'broadcast', event: 'party_mode', payload: { active } });
    }
    async function adminGiveMoney() {
        const target = $('#admin-target-id').val();
        const amount = $('#admin-coin-amount').val();
        if (target && amount) await globalChan.send({ type: 'broadcast', event: 'payout', payload: { target, amount } });
    }
    
    // --- BOARD & CHAT LOCK/UNLOCK ---
    function lockBoardAndChat() {
        $('#board-wrapper').addClass('board-locked');
        $('#chat-input').prop('disabled', true).attr('placeholder', 'Waiting for match...');
        // Remove any existing drag handlers on pieces
        if (board) board.destroy();
        board = Chessboard('board', {
            position: game.fen(),
            pieceTheme: getPieceUrl,
            draggable: false
        });
    }

    function unlockBoardAndChat() {
        $('#board-wrapper').removeClass('board-locked');
        $('#chat-input').prop('disabled', false).attr('placeholder', 'Chat...');
    }

    // UI Helpers
    function showView(id) {
        $('.tab-content').addClass('hidden');
        $('#' + id).removeClass('hidden');
        // Re-lock board/chat whenever navigating away from an active game
        if (id !== 'view-game' || !currentMatchId) {
            lockBoardAndChat();
        }
    }
    function updateCoinUI() { $('#nav-coins').text(`💰 ${myCoins}`); }
</script>
</body>
</html>
